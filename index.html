<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>Arc Enemies</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <!-- Hidden input that receives keyboard/mobile-keyboard text for name entry -->
  <input id="name-input" type="text" maxlength="14" autocomplete="off" autocorrect="off" spellcheck="false" />

  <script type="module" src="src/game.js"></script>
  <script>
    const GAME_W = 1280, GAME_H = 720;
    function scaleCanvas() {
      const scale = Math.min(
        window.innerWidth  / (GAME_W + 2),
        window.innerHeight / (GAME_H + 2),
        1
      );
      document.getElementById("game").style.transform = `scale(${scale})`;
    }
    window.addEventListener("resize", scaleCanvas);
    scaleCanvas();

    // Request fullscreen on first interaction (Android Chrome).
    document.addEventListener("pointerdown", () => {
      if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
        document.documentElement.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
      }
    }, { once: true });
  </script>
</body>
</html>
